{% extends 'base.html' %}
{% block title %}Email Terkirim — SkyWise AI{% endblock %}
{% block footer %}{% endblock %}
{% block content %}
<div style="min-height:calc(100vh - 64px);display:flex;align-items:center;justify-content:center;background:linear-gradient(155deg,#AFC9DE,#5B8AAE,#2C5470);padding:2rem;">
  <div style="width:100%;max-width:420px;">
    <div class="glass fu" style="padding:2.5rem;text-align:center;">
      <div style="font-size:4rem;margin-bottom:1rem;">📧</div>
      <h2 style="font-size:1.3rem;font-weight:800;margin-bottom:.75rem;">Email Terkirim!</h2>
      <p style="color:#64748b;font-size:.9rem;line-height:1.7;margin-bottom:1.5rem;">Kami telah mengirimkan link reset password ke email kamu. Cek inbox atau folder spam ya!</p>
      <a href="{% url 'login' %}" class="btn btn-primary" style="border-radius:12px;padding:12px 28px;"><i class="fa fa-arrow-left"></i> Kembali ke Login</a>
    </div>
  </div>
</div>
{% endblock %}
